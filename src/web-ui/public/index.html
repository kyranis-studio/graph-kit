<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GraphKit Web UI</title>
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div id="app">
  <header id="toolbar">
    <div class="toolbar-left">
      <span class="logo">GraphKit</span>
      <span id="graphName" class="graph-name"></span>
      <span id="modeBadge" class="mode-badge"></span>
    </div>
    <div class="toolbar-center">
      <span id="statusText" class="status-text">Ready</span>
    </div>
    <div class="toolbar-right">
      <button id="btnZoomOut" class="btn btn-icon" title="Zoom Out">−</button>
      <span id="zoomDisplay" class="zoom-display">100%</span>
      <button id="btnZoomIn" class="btn btn-icon" title="Zoom In">+</button>
      <button id="btnZoomReset" class="btn btn-small" title="Reset Zoom &amp; Pan">Reset</button>
      <div class="toolbar-divider"></div>
      <button id="btnExecute" class="btn btn-primary">Execute</button>
      <button id="btnStep" class="btn btn-secondary" style="display:none">Step</button>
      <button id="btnCancel" class="btn btn-danger" style="display:none">Cancel</button>
    </div>
  </header>

  <div id="mainContainer" class="main-container">
    <div id="leftPanel" class="panel panel-left">
      <div class="panel-header">
        <span>Graph</span>
        <span id="zoomLevel" class="zoom-level">100%</span>
        <span id="nodeCounter" class="counter">0 nodes</span>
      </div>
      <div id="graphContainer" class="graph-container">
        <div id="graphViewport" class="graph-viewport">
        <canvas id="graphCanvas" class="graph-canvas"></canvas>
        </div>
        <div id="minimap" class="minimap">
          <div class="minimap-header">Overview</div>
          <svg id="minimapSvg"></svg>
        </div>
      </div>
    </div>
    <div id="resizeHandle" class="resize-handle"></div>
    <div id="rightPanel" class="panel panel-right">
      <div class="panel-header">
        <span>Debug Info</span>
        <button id="btnClearLog" class="btn btn-small">Clear</button>
      </div>
      <div id="debugLog" class="debug-log"></div>
      <div id="nodeDetails" class="node-details" style="display:none">
        <div class="details-header">
          <span id="detailTitle">Node Details</span>
          <button id="btnCloseDetails" class="btn btn-small">&times;</button>
        </div>
        <div id="detailContent" class="detail-content"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/dagre@0.8.5/dist/dagre.min.js"></script>
<script src="/app.js"></script>
</body>
</html>
